name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      # Spotless runs Prettier (web + TOML formatting) via Node/npm.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check formatting
        run: ./gradlew spotlessCheck

      # spotlessCheck only validates Prettier formatting, not key order, so verify
      # the version catalog is sorted by running the formatter and checking for diffs.
      - name: Check version catalog is sorted
        run: |
          ./gradlew versionCatalogFormat
          git diff --exit-code gradle/libs.versions.toml \
            || { echo "::error::gradle/libs.versions.toml is not sorted. Run './gradlew versionCatalogFormat' and commit the result."; exit 1; }

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run detekt
        run: ./gradlew :composeApp:detektAll

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew wasmJsTest

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Export Library Definitions
        run: ./gradlew :composeApp:exportLibraryDefinitions -PaboutLibraries.exportPath=src/commonMain/composeResources/files/

      - name: Build
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
